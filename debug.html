<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>OAuth debug — Strava Calendar</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px 16px; background: #f9f9f7; color: #0b0b0b; }
    @media (prefers-color-scheme: dark) { body { background: #0d0d0d; color: #fff; } .card { background: #1a1a19 !important; border-color: #2c2c2a !important; } }
    .card { max-width: 560px; margin: 0 auto; background: #fcfcfb; border: 1px solid #e1e0d9; border-radius: 12px; padding: 20px; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #898781; margin: 14px 0 4px; }
    .value { font-family: ui-monospace, monospace; font-size: 14px; word-break: break-all; padding: 10px; border: 1px solid #c3c2b7; border-radius: 8px; user-select: all; -webkit-user-select: all; }
    button { font: inherit; margin-top: 6px; padding: 8px 14px; border-radius: 8px; border: 1px solid #2a78d6; background: #2a78d6; color: #fff; font-weight: 600; }
    p { color: #898781; font-size: 13px; }
    .ok { color: #006300; } .bad { color: #d03b3b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Strava OAuth debug</h1>
    <div id="content"><p>No <code>?code=</code> in the URL. Land here via a Strava authorization redirect.</p></div>
  </div>
  <script>
    const q = new URLSearchParams(location.search);
    const code = q.get('code');
    if (code) {
      const scope = q.get('scope') || '(none reported)';
      const hasActivity = /activity:read/.test(scope);
      document.getElementById('content').innerHTML = `
        <p>Authorization landed here instead of the app — nothing was exchanged or stored. Copy these back to the debugging session.</p>
        <label>Authorization code (single-use, expires in minutes)</label>
        <div class="value" id="code">${code.replace(/[^\w-]/g, '')}</div>
        <button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent).then(()=>this.textContent='Copied!')">Copy code</button>
        <label>Granted scopes</label>
        <div class="value">${scope.replace(/[^\w:,._-]/g, '')}</div>
        <p class="${hasActivity ? 'ok' : 'bad'}">${hasActivity
          ? '✓ includes activity:read — activity access was granted'
          : '✗ missing activity:read — this grant cannot read activities'}</p>`;
    }
  </script>
</body>
</html>
